name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    env:
      GIN_MODE: test
      DB_USER: postgres
      DB_PASSWORD: 123qwe
      DB_NAME: exchange
      DATABASE_URL: postgres://postgres:123qwe@localhost:5432/exchange?sslmode=disable
      DB_CONTAINER: exchange-postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build services
        run: make build

      - name: Start infrastructure
        run: make test-infra-up

      - name: Database migration
        run: make db-migrate

      - name: Run all tests (Unit, Integration, Race)
        run: make test-all

      - name: Stop infrastructure
        if: always()
        run: make test-infra-down
