services:
  # ----------------------------------------------------------
  # Production / Load Testing Environment
  # ----------------------------------------------------------

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    container_name: exchange-gateway-prod
    ports:
      - "${GATEWAY_PORT:-8100}:${GATEWAY_PORT:-8100}"
    env_file:
      - .env
    environment:
      GIN_MODE: release
      # 已移除 GOMAXPROCS 與資源限制，以測出架構真實極限
    depends_on:
      - order-service
      - market-data-service
    networks:
      - postgres_default
      - redis_default
      - redpanda_default
      - prometheus-grafana_default

  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: matching-engine
    container_name: exchange-matching-engine-prod
    # 生產環境不對外暴露 port，只允許 Docker 內部網路互相存取
    # 若需 Prometheus 抓取指標，請使用 Docker 內部 DNS (service name) 而非 host ports
    env_file:
      - .env
    environment:
      GIN_MODE: release
      # 已移除 GOMAXPROCS 與資源限制，以測出架構真實極限
    networks:
      - postgres_default
      - redis_default
      - redpanda_default
      - prometheus-grafana_default
  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: exchange-order-service-prod
    # 生產環境不對外暴露 port，流量只能透過 gateway 進入
    env_file:
      - .env
    environment:
      GIN_MODE: release
      # 已移除 GOMAXPROCS 與資源限制，以測出架構真實極限
    depends_on:
      - matching-engine
    networks:
      - postgres_default
      - redis_default
      - redpanda_default
      - prometheus-grafana_default

  market-data-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: market-data-service
    container_name: exchange-market-data-service-prod
    # 生產環境不對外暴露 port，WebSocket 連線統一走 gateway /ws 路由
    env_file:
      - .env
    environment:
      GIN_MODE: release
      # 已移除 GOMAXPROCS 與資源限制，以測出架構真實極限
    depends_on:
      - matching-engine
      - order-service
    networks:
      - postgres_default
      - redis_default
      - redpanda_default
      - prometheus-grafana_default

  simulation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: simulation-service
    container_name: exchange-simulation-service-prod
    ports:
      - "${SIMULATION_SERVICE_PORT:-8104}:${SIMULATION_SERVICE_PORT:-8104}"
    env_file:
      - .env
    environment:
      GIN_MODE: release
    depends_on:
      - gateway
    networks:
      - postgres_default
      - redis_default
      - redpanda_default
      - prometheus-grafana_default

networks:
  postgres_default:
    external: true
  redis_default:
    external: true
  redpanda_default:
    external: true
  prometheus-grafana_default:
    external: true