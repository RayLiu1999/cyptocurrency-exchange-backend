/api/v1/accounts:
  get:
    description: 取得指定用戶的所有資產餘額
    parameters:
      - description: 用戶 ID (UUID)
        in: query
        name: user_id
        required: true
        type: string
    produces:
      - application/json
    responses:
      "200":
        description: OK
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
      "400":
        description: Bad Request
      "500":
        description: Internal Server Error
    summary: 查詢餘額 (Get Balances)
    tags:
      - Accounts
