services:
  # ----------------------------------------------------------
  # 微服務
  # ----------------------------------------------------------

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: exchange-gateway
    command: air -c .air.gateway.toml
    ports:
      - "${GATEWAY_PORT:-8100}:${GATEWAY_PORT:-8100}"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      order-service:
        condition: service_healthy
      market-data-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${GATEWAY_PORT:-8100}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: exchange-matching-engine
    command: air -c .air.matching-engine.toml
    # [僅開發環境] 對外映射 port 方便 Postman / Prometheus 直接存取底層服務
    # 生產環境 (docker-compose.test.yml) 已移除此映射，強制所有流量走 gateway
    ports:
      - "${MATCHING_ENGINE_PORT:-8101}:${MATCHING_ENGINE_PORT:-8101}" # health check & metrics
    volumes:
      - .:/app
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${MATCHING_ENGINE_PORT:-8101}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: exchange-order-service
    command: air -c .air.order-service.toml
    # [僅開發環境] 對外映射 port 方便 Postman / Prometheus 直接存取底層服務
    # 生產環境 (docker-compose.test.yml) 已移除此映射，強制所有流量走 gateway
    ports:
      - "${ORDER_SERVICE_PORT:-8103}:${ORDER_SERVICE_PORT:-8103}" # HTTP API
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      matching-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${ORDER_SERVICE_PORT:-8103}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  market-data-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: exchange-market-data-service
    command: air -c .air.market-data-service.toml
    # [僅開發環境] 對外映射 port 方便 Postman / Prometheus 直接存取底層服務
    # 生產環境 (docker-compose.test.yml) 已移除此映射，強制所有流量走 gateway
    ports:
      - "${MARKET_DATA_PORT:-8102}:${MARKET_DATA_PORT:-8102}" # WebSocket & metrics
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      matching-engine:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${MARKET_DATA_PORT:-8102}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
