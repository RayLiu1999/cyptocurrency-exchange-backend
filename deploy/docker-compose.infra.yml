services:
  # ----------------------------------------------------------
  # 基礎設施 (PostgreSQL / Redis / Redpanda)
  # ----------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: exchange-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123qwe}
      POSTGRES_DB: ${DB_NAME:-exchange}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-exchange}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - postgres_default

  redis:
    image: redis:7-alpine
    container_name: exchange-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-123qwe}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123qwe}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - redis_default

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: exchange-redpanda
    ports:
      - "19092:19092"
      - "9092:9092"
    command:
      - redpanda
      - start
      - --napi=0
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redpanda_default

networks:
  postgres_default:
    name: postgres_default
  redis_default:
    name: redis_default
  redpanda_default:
    name: redpanda_default
  prometheus-grafana_default:
    name: prometheus-grafana_default
